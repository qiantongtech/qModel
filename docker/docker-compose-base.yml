services:
  redis:
    image: redis:6-alpine
    profiles: ["base"]
    env_file: .env
    restart: always
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-J98%FHF#9h@e88h9fre9}
#    volumes:
#      # Mount the redis data directory to the container.
#      - ./redis/data:/data
    # Set the redis password when startup redis server.
    command: redis-server --requirepass ${REDIS_PASSWORD:-J98%FHF#9h@e88h9fre9}
    ports:
      - "${EXPOSE_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-J98%FHF#9h@e88h9fre9}', 'ping' ]
    networks:
      - qmodel_net
    extra_hosts:    
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.24.0
    restart: always
    profiles: ["base"]
    env_file: .env
    ports:
      - '${EXPOSE_NGINX_PORT:-80}:${NGINX_PORT:-80}'
    networks:
      - qmodel_net
    volumes:
      - ./qModel/nginx/dist:/usr/share/nginx
      - ./qModel/nginx/logs:/var/log/nginx
      - ./qModel/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./qModel/nginx/sites/:/etc/nginx/http_vhost/:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
  
  #MySQL主库
  mysql57:
    image: mysql:5.7
    profiles: ["base"]
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD:  ${MYSQL_ROOT_PASSWORD:-lJ7gP0cA5dD2dA1hA3bJ}   # ← 修改成你的
      TZ: "Asia/Shanghai"                          # 如需改时区请改
    ports:
      - "43306:3306"
    volumes:
      - ./qModel/mysql/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./qModel/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - qmodel_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-plJ7gP0cA5dD2dA1hA3bJ" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 300s
    extra_hosts:
      - "host.docker.internal:host-gateway"


